const AV_PALETTE = ["#A31F37","#4F46E5","#0EA5E9","#10B981","#D97706","#7C3AED","#DB2777","#059669"];
function avColor(n=""){ let h=0; for(let i=0;i<n.length;i++) h=(h*31+n.charCodeAt(i))>>>0; return AV_PALETTE[h%AV_PALETTE.length]; }
function fmtNum(n){ return n>=1000?`${(n/1000).toFixed(1)}k`:String(n); }

/* ─── Logo ─── */
function Logo({ size=18 }) {
  return (
    <div style={{display:"inline-flex",alignItems:"baseline",font:`600 ${size}px var(--font-ui)`,letterSpacing:"-0.04em",color:"var(--fg-primary)",userSelect:"none"}}>

      </span>
    </div>
  );
}

/* ─── Avatar ─── */
function Av({ name="?", size=28 }) {
  const c = avColor(name);
  return (
    <div style={{
      width:size, height:size, borderRadius:"50%", flexShrink:0,
      background:`linear-gradient(135deg,${c} 0%,rgba(0,0,0,0.38) 100%)`,
      display:"inline-flex", alignItems:"center", justifyContent:"center",
      color:"#fff", font:`600 ${Math.round(size*0.42)}px var(--font-ui)`,
    }}>{name[0]?.toUpperCase()}</div>
  );
}

            {["S","M","T","W","T","F","S"].map((d,i)=><div key={i} style={{textAlign:"center",font:"600 9px var(--font-ui)",color:"#71717A",padding:"2px 0"}}>{d}</div>)}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:"2px 0"}}>
            {[...Array(35)].map((_,i)=>{

              const active = day===14;
              const inRange = day>=10&&day<=14;
              const today = day===2;
              if(day<1||day>31) return <div key={i}/>;
              return (
                <div key={i} style={{
                  width:"100%",aspectRatio:"1",display:"flex",alignItems:"center",justifyContent:"center",
                  borderRadius:"50%",
                  background:active?"#8B1A2F":inRange?"rgba(139,26,47,0.2)":"transparent",
                  font:`${active||today?"600":"400"} 9px var(--font-ui)`,
                  color:active?"#fff":today?"#8B1A2F":inRange?"#F5F5F7":"#71717A",
                  cursor:"pointer",
                }}>{day}</div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  ),
};

/* ─── Filter Bar ─── */
function FilterBar({ activeFramework, setActiveFramework, activeSort, setActiveSort, activeTags, setActiveTags, resultCount }) {
  const [tagOpen, setTagOpen] = useState(false);
  const tagRef = useRef(null);

  useEffect(() => {
    if (!tagOpen) return;
    const handler = (e) => { if (tagRef.current && !tagRef.current.contains(e.target)) setTagOpen(false); };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, [tagOpen]);

  const toggleTag = (tag) => {
    setActiveTags(prev => prev.includes(tag) ? prev.filter(t=>t!==tag) : [...prev, tag]);
  };

  return (
    <div style={{
      position:"sticky", top:52, zIndex:20,
      background:"var(--bg-surface)",
      borderBottom:"1px solid var(--border-subtle)",
      display:"flex", alignItems:"center",
      padding:"0 24px",
      height:48,
      gap:12,
      overflowX:"auto",
      scrollbarWidth:"none",
      flexShrink:0,
    }}>
      {/* Label */}
      <span style={{font:"500 13px var(--font-ui)",color:"var(--fg-muted)",flexShrink:0}}>Filter:</span>

      {/* Framework pills */}
      <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
        {FRAMEWORKS.map(fw => {
          const active = activeFramework === fw;
          return (
            <button key={fw} onClick={() => setActiveFramework(fw)} style={{
              height:28, padding:"0 12px",
              borderRadius:999,
              border:`1px solid ${active?"var(--accent)":"var(--border-strong)"}`,
              background:active?"var(--accent)":"transparent",
              color:active?"var(--accent-fg)":"var(--fg-secondary)",
              font:"500 13px var(--font-ui)",
              cursor:"pointer",
              transition:"all 0.12s",
              flexShrink:0,
              whiteSpace:"nowrap",
            }}>{fw}</button>
          );
        })}
      </div>

      {/* Divider */}
      <div style={{width:1,height:20,background:"var(--border-strong)",flexShrink:0}}/>

      {/* Sort dropdown */}
      <div style={{position:"relative",flexShrink:0}}>
        <select
          value={activeSort}
          onChange={e=>setActiveSort(e.target.value)}
          style={{
            height:32,padding:"0 28px 0 10px",
            background:"var(--bg-elevated)",
            border:"1px solid var(--border-strong)",
            borderRadius:6,
            color:"var(--fg-primary)",
            font:"500 13px var(--font-ui)",
            cursor:"pointer",
            appearance:"none",
            WebkitAppearance:"none",
          }}
        >
          {SORTS.map(s=><option key={s} value={s}>{s}</option>)}
        </select>
        <div style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",pointerEvents:"none",color:"var(--fg-muted)"}}>
          {IC.chevDown}
        </div>
      </div>

      {/* Tags multi-select */}
      <div ref={tagRef} style={{position:"relative",flexShrink:0}}>
        <button onClick={()=>setTagOpen(v=>!v)} style={{
          height:28,padding:"0 12px",
          borderRadius:999,
          border:`1px dashed ${activeTags.length>0?"var(--accent)":"var(--border-strong)"}`,
          background:activeTags.length>0?"var(--accent-muted)":"transparent",
          color:activeTags.length>0?"var(--accent-hover)":"var(--fg-secondary)",
          font:"500 13px var(--font-ui)",
          cursor:"pointer",
          display:"flex",alignItems:"center",gap:6,
          transition:"all 0.12s",
        }}>
          {IC.tag}
          {activeTags.length>0 ? `${activeTags.length} tag${activeTags.length>1?"s":""}` : "+ Tags"}
        </button>
        {tagOpen && (
          <div style={{
            position:"absolute",top:"calc(100% + 6px)",left:0,
            background:"var(--bg-surface)",
            border:"1px solid var(--border-strong)",
            borderRadius:8,
            padding:8,
            display:"flex",flexWrap:"wrap",gap:4,
            width:280,
            boxShadow:"0 8px 24px rgba(0,0,0,0.4)",
            zIndex:50,
          }}>
            {POPULAR_TAGS.map(tag => {
              const on = activeTags.includes(tag);
              return (
                <button key={tag} onClick={()=>toggleTag(tag)} style={{
                  height:24,padding:"0 10px",
                  borderRadius:999,
                  border:`1px solid ${on?"var(--accent)":"var(--border-subtle)"}`,
                  background:on?"var(--accent-muted)":"transparent",
                  color:on?"var(--accent-hover)":"var(--fg-secondary)",
                  font:"500 12px var(--font-ui)",
                  cursor:"pointer",
                  transition:"all 0.1s",

              );

          </div>

      </div>

      {/* Spacer */}
      <div style={{flex:1}}/>

      {/* Result count */}
      <span style={{font:"500 13px var(--font-ui)",color:"var(--fg-muted)",flexShrink:0,whiteSpace:"nowrap"}}>

  );

/* ─── App ─── */
function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [activeFramework, setActiveFramework] = useState("React");
  const [activeSort, setActiveSort] = useState("Trending");
  const [activeTags, setActiveTags] = useState([]);
  const [loading, setLoading] = useState(false);
  const [count, setCount] = useState(1284);

  const theme = tweaks.theme;
  const cols = parseInt(tweaks.columns, 10) || 3;

  // Sync theme
  useEffect(() => {
    document.documentElement.setAttribute("data-theme", theme);
  }, [theme]);

  const toggleTheme = () => setTweak("theme", theme === "dark" ? "light" : "dark");

  // Filter components
  const filtered = ALL_COMPONENTS.filter(c => {
    if (activeFramework !== "All" && c.fw !== activeFramework) return false;
    if (activeTags.length > 0 && !activeTags.some(t => c.tags.includes(t))) return false;
    return true;
  });

  const handleLoadMore = () => {
    setLoading(true);
    setTimeout(() => { setLoading(false); setCount(c=>c+12); }, 1400);
  };

  return (
    <div style={{display:"flex",height:"100vh",overflow:"hidden",background:"var(--bg-canvas)"}}>
      {/* Left Sidebar */}
      <LeftSidebar theme={theme} toggleTheme={toggleTheme} />

      {/* Main column — filter bar + grid */}
      <div style={{flex:1,minWidth:0,display:"flex",flexDirection:"column",height:"100vh",overflowY:"auto"}}>
        {/* Sticky center topbar */}
        <CenterTopbar />

        {/* Sticky filter bar */}
        <FilterBar
          activeFramework={activeFramework}
          setActiveFramework={setActiveFramework}
          activeSort={activeSort}
          setActiveSort={setActiveSort}
          activeTags={activeTags}
          setActiveTags={setActiveTags}
          resultCount={count}
        />

        {/* Grid area */}
        <main style={{padding:"24px 24px 0",flex:1}}>
          {filtered.length > 0 ? (
            <ExploreGrid components={filtered} cols={cols}/>
          ) : (
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"80px 24px",gap:12}}>
              <div style={{font:"500 15px var(--font-ui)",color:"var(--fg-secondary)"}}>No components match these filters</div>
              <button onClick={()=>{setActiveFramework("All");setActiveTags([]);}} style={{height:32,padding:"0 16px",borderRadius:6,background:"transparent",border:"1px solid var(--border-strong)",color:"var(--fg-secondary)",font:"500 13px var(--font-ui)",cursor:"pointer"}}>
                Clear filters
              </button>
            </div>
          )}

          {/* Load more */}
          {filtered.length > 0 && (
            <div style={{marginTop:40,marginBottom:40,textAlign:"center"}}>
              <button
                onClick={handleLoadMore}
                disabled={loading}
                style={{
                  height:36,padding:"0 28px",
                  borderRadius:6,
                  background:"transparent",
                  border:"1px solid var(--border-strong)",
                  color:"var(--fg-secondary)",
                  font:"500 13px var(--font-ui)",
                  cursor:loading?"default":"pointer",
                  display:"inline-flex",alignItems:"center",gap:8,
                  transition:"border-color 0.12s,color 0.12s",
                  opacity:loading?0.7:1,
                }}
                onMouseEnter={e=>{ if(!loading){ e.currentTarget.style.borderColor="var(--fg-muted)"; e.currentTarget.style.color="var(--fg-primary)"; }}}
                onMouseLeave={e=>{ e.currentTarget.style.borderColor="var(--border-strong)"; e.currentTarget.style.color="var(--fg-secondary)"; }}
              >
                {loading ? <><Spinner /> Loading…</> : "Load more"}
              </button>
            </div>
          )}
        </main>
      </div>

      {/* Tweaks */}
      <TweaksPanel>
        <TweakSection label="Theme" />
        <TweakRadio id="theme" options={["dark","light"]} value={tweaks.theme} onChange={v => setTweak("theme", v)} />
        <TweakSection label="Grid columns" />
        <TweakRadio id="columns" options={["1","2","3","4"]} value={tweaks.columns} onChange={v => setTweak("columns", v)} />
        <TweakSection label="Card style" />
        <TweakRadio id="cardStyle" options={["default","compact"]} value={tweaks.cardStyle} onChange={v => setTweak("cardStyle", v)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
