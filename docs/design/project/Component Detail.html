/* ─── Helpers ─── */
const AV_PALETTE = ["#A31F37","#4F46E5","#0EA5E9","#10B981","#D97706","#7C3AED","#DB2777","#059669"];
function avColor(n=""){ let h=0; for(let i=0;i<n.length;i++) h=(h*31+n.charCodeAt(i))>>>0; return AV_PALETTE[h%AV_PALETTE.length]; }

function Logo({ size=18 }) {
  return (
    <div style={{display:"inline-flex",alignItems:"baseline",font:`600 ${size}px var(--font-ui)`,letterSpacing:"-0.04em",color:"var(--fg-primary)",userSelect:"none"}}>
      compon<span style={{display:"inline-block",position:"relative"}}>i<span style={{position:"absolute",left:`${size*0.15}px`,top:`${size*0.15}px`,width:`${Math.max(4,size*0.2)}px`,height:`${Math.max(4,size*0.2)}px`,background:"var(--accent)",borderRadius:"1px"}}/></span>
    </div>
  );
}

function Av({ name="M", size=36, color }) {
  const c = color||avColor(name);
  return <div style={{width:size,height:size,borderRadius:"50%",flexShrink:0,background:`linear-gradient(135deg,${c} 0%,rgba(0,0,0,0.45) 100%)`,display:"inline-flex",alignItems:"center",justifyContent:"center",color:"#fff",font:`600 ${Math.round(size*0.42)}px var(--font-ui)`}}>{name[0]?.toUpperCase()}</div>;
}

function FwBadge({ fw }) {
  const dots = { React:"#61DAFB", Vue:"#42B883", Svelte:"#FF3E00" };
  return <span style={{display:"inline-flex",alignItems:"center",gap:5,height:22,padding:"0 10px",borderRadius:4,font:"500 11px var(--font-mono)",background:"var(--bg-elevated)",color:"var(--fg-secondary)",border:"1px solid var(--border-subtle)"}}>
    <span style={{width:6,height:6,borderRadius:"50%",background:dots[fw]||"var(--accent)"}}/>{fw}
  </span>;
}

function GhostBtn({ icon, children, onClick, active }) {
  return <button onClick={onClick} style={{display:"inline-flex",alignItems:"center",gap:6,height:30,padding:children?"0 12px":"0 8px",width:children?undefined:30,borderRadius:6,background:active?"var(--bg-elevated)":"transparent",border:"1px solid var(--border-subtle)",color:"var(--fg-secondary)",font:"500 12px var(--font-ui)",transition:"background 0.12s,color 0.12s"}}
    onMouseEnter={e=>{e.currentTarget.style.background="var(--bg-elevated)";e.currentTarget.style.color="var(--fg-primary)";}}
    onMouseLeave={e=>{e.currentTarget.style.background=active?"var(--bg-elevated)":"transparent";e.currentTarget.style.color="var(--fg-secondary)";}}>
    {icon}{children}
  </button>;
}

/* ─── Mini preview thumbnail ─── */
function MiniPreview({ seed=0 }) {
  const bgs = [
    "radial-gradient(circle at 55% 40%,#1A1D24 0%,#0A0B0D 72%)",
    "linear-gradient(135deg,#12141A 0%,#1A1D24 100%)",
    "linear-gradient(135deg,#3D0B14 0%,#0A0B0D 100%)",
    "radial-gradient(circle at 30% 60%,#1A1D24 0%,#0A0B0D 70%)",

/* ─── LINEAGE TAB ─── */
const LINEAGE_NODES = [
  { id:"anc1", level:0, col:0, row:0, name:"modal-base",     author:"@kenji",  forks:3,  seed:1 },
  { id:"anc2", level:1, col:1, row:0, name:"modal-v2",       author:"@theo",   forks:12, seed:2 },
  { id:"curr", level:2, col:2, row:0, name:"command-palette",author:"@luiz",   forks:34, seed:0, current:true },
  { id:"d1",   level:3, col:3, row:0, name:"cmd-dark",       author:"@sarah",  forks:5,  seed:3 },
  { id:"d2",   level:3, col:3, row:1, name:"cmd-vue",        author:"@carlos", forks:8,  seed:4 },
  { id:"d3",   level:3, col:3, row:2, name:"cmd-mini",       author:"@anya",   forks:2,  seed:1 },
];

const LINEAGE_EDGES = [
  { from:"anc1", to:"anc2" },
  { from:"anc2", to:"curr" },
  { from:"curr", to:"d1" },
  { from:"curr", to:"d2" },
  { from:"curr", to:"d3" },
];

const NODE_W = 90, NODE_H = 90, COL_GAP = 80, ROW_GAP = 20;

function getNodePos(node) {
  return {
    x: node.col * (NODE_W + COL_GAP),
    y: node.row * (NODE_H + ROW_GAP),
  };
}

function LineageTab() {
  const [hovered, setHovered] = useState(null);
  const totalCols = 4, totalRows = 3;
  const svgW = totalCols * (NODE_W + COL_GAP) - COL_GAP + 40;
  const svgH = totalRows * (NODE_H + ROW_GAP) - ROW_GAP;

  return (
    <div style={{overflowX:"auto",padding:"24px 0 32px",scrollbarWidth:"thin"}}>
      <div style={{position:"relative",display:"inline-block",minWidth:svgW+40,padding:"0 20px"}}>
        {/* SVG edges */}
        <svg style={{position:"absolute",top:0,left:0,width:svgW+40,height:svgH,pointerEvents:"none",overflow:"visible"}}>
          {LINEAGE_EDGES.map(e=>{
            const from = LINEAGE_NODES.find(n=>n.id===e.from);
            const to   = LINEAGE_NODES.find(n=>n.id===e.to);
            const fx = getNodePos(from).x + NODE_W + 20;
            const fy = getNodePos(from).y + NODE_H/2;
            const tx = getNodePos(to).x + 20;
            const ty = getNodePos(to).y + NODE_H/2;
            const cx = (fx+tx)/2;
            const isAccent = from.id==="curr"||to.id==="curr";
            const dimmed = hovered && hovered!==from.id && hovered!==to.id;
            return (
              <path key={`${e.from}-${e.to}`}
                d={`M${fx},${fy} C${cx},${fy} ${cx},${ty} ${tx},${ty}`}
                fill="none"
                stroke={isAccent?"var(--accent)":"var(--border-strong)"}
                strokeWidth={isAccent?2:1.5}
                opacity={dimmed?0.15:1}
                strokeDasharray={isAccent?"none":"4 3"}
                style={{transition:"opacity 0.15s"}}
              />
            );
          })}
          {/* Arrow heads */}
          {LINEAGE_EDGES.map(e=>{
            const to = LINEAGE_NODES.find(n=>n.id===e.to);
            const from = LINEAGE_NODES.find(n=>n.id===e.from);
            const tx = getNodePos(to).x + 20;
            const ty = getNodePos(to).y + NODE_H/2;
            const isAccent = from.id==="curr"||to.id==="curr";
            const dimmed = hovered && hovered!==from.id && hovered!==to.id;
            return (
              <polygon key={`arr-${e.to}`}
                points={`${tx},${ty} ${tx-8},${ty-4} ${tx-8},${ty+4}`}
                fill={isAccent?"var(--accent)":"var(--border-strong)"}
                opacity={dimmed?0.15:1}
                style={{transition:"opacity 0.15s"}}
              />
            );
          })}
        </svg>

        {/* Nodes */}
        <div style={{position:"relative",height:svgH}}>
          {LINEAGE_NODES.map(node=>{
            const { x, y } = getNodePos(node);
            const isHovered = hovered===node.id;
            const isDimmed = hovered && !node.current && hovered!==node.id;
            return (
              <div key={node.id}
                onMouseEnter={()=>setHovered(node.id)}
                onMouseLeave={()=>setHovered(null)}
                style={{
                  position:"absolute",
                  left: x+20, top: y,
                  width:NODE_W, height:NODE_H,
                  borderRadius:8,overflow:"hidden",cursor:"pointer",
                  border:`${node.current?"2px solid var(--accent)":"1px solid var(--border-subtle)"}`,
                  boxShadow: node.current?"0 0 0 4px var(--accent-muted)":(isHovered?"0 4px 20px rgba(0,0,0,0.4)":"none"),
                  transform: node.current?"scale(1.08)":(isHovered?"scale(1.04)":"scale(1)"),
                  opacity: isDimmed?0.3:1,
                  transition:"transform 0.15s, opacity 0.15s, box-shadow 0.15s",
                  zIndex: node.current?10:(isHovered?5:1),
                  background:"var(--bg-elevated)",
                }}>
                <MiniPreview seed={node.seed} />
                {/* Author avatar tucked bottom-right */}
                <div style={{position:"absolute",bottom:6,right:6}}>
                  <Av name={node.author.slice(1)} size={20} />
                </div>
                {/* Name below (absolute, outside overflow) */}
                <div style={{
                  position:"absolute",bottom:-38,left:"50%",transform:"translateX(-50%)",
                  whiteSpace:"nowrap",textAlign:"center",pointerEvents:"none",
                }}>
                  <div style={{font:`${node.current?"600":"500"} 11px var(--font-ui)`,color:node.current?"var(--fg-primary)":"var(--fg-secondary)"}}>{node.name}</div>
                  <div style={{font:"400 10px monospace",color:"var(--fg-muted)"}}>{node.author} · ⑂{node.forks}</div>
                </div>
              </div>
            );
          })}
        </div>
        {/* Spacer for labels below nodes */}
        <div style={{height:44}}/>
      </div>
    </div>
  );
}

              </div>
            </div>

            {/* Used by */}
            <div>
              <div style={{font:"500 10px var(--font-ui)",letterSpacing:"0.06em",textTransform:"uppercase",color:"var(--fg-muted)",marginBottom:10}}>Used by</div>
              <div style={{display:"flex",alignItems:"center"}}>
                {["Sarah","Carlos","Priya","Felix","Anya"].map((n,i)=>(
                  <div key={n} style={{marginLeft:i===0?0:-6,zIndex:5-i}}>
                    <Av name={n} size={26}/>
                  </div>
                ))}
                <span style={{marginLeft:10,font:"400 12px monospace",color:"var(--fg-muted)"}}>+208 more</span>
              </div>
            </div>
          </aside>
        )}
      </div>

      {/* Mobile floating action bar */}
      {!isDesktop && (
        <div style={{position:"sticky",bottom:0,left:0,right:0,height:56,background:"var(--bg-surface)",borderTop:"1px solid var(--border-subtle)",display:"flex",alignItems:"stretch",zIndex:20}}>
          {[
            {label:liked?"Liked":"Like",icon:liked?IC.heartFill:IC.heart,onClick:doLike,accent:liked},
            {label:"Fork →",icon:IC.fork,accent:true,primary:true},
            {label:"Share",icon:IC.share},
          ].map(a=>(
            <button key={a.label} onClick={a.onClick} style={{
              flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:8,
              background:a.primary?"var(--accent)":"transparent",border:"none",
              color:a.primary?"#fff":a.accent?"var(--accent)":"var(--fg-secondary)",
              font:"600 13px var(--font-ui)",borderRight:"1px solid var(--border-subtle)",
            }}>{a.icon}{a.label}</button>
          ))}
        </div>
      )}
    </div>
  );
}

/* ─── Mobile TopBar ─── */
function MobileTopBar({ theme, toggleTheme }) {
  return (
    <header style={{position:"sticky",top:0,zIndex:30,height:52,display:"flex",alignItems:"center",padding:"0 16px",gap:12,background:"var(--bg-canvas)",borderBottom:"1px solid var(--border-subtle)",backdropFilter:"blur(8px)"}}>
      <a href="Home Feed.html"><Logo size={18}/></a>
      <div style={{flex:1}}/>
      <button onClick={toggleTheme} style={{width:40,height:40,display:"inline-flex",alignItems:"center",justifyContent:"center",background:"transparent",border:"none",color:"var(--fg-primary)",borderRadius:8}}>
        {theme==="dark"?IC.sun:IC.moon}
      </button>
      <button style={{width:40,height:40,display:"inline-flex",alignItems:"center",justifyContent:"center",background:"transparent",border:"none",color:"var(--fg-primary)",borderRadius:8}}>
        {IC.search}
      </button>
    </header>
  );
}

/* ─── App ─── */
function App() {
  const [theme, setTheme] = useState(()=>{ try { return localStorage.getItem("componi-theme")||"dark"; } catch { return "dark"; }});
  const [mq, setMq] = useState(window.innerWidth);
  useEffect(()=>{ const r=()=>setMq(window.innerWidth); window.addEventListener("resize",r); return ()=>window.removeEventListener("resize",r); },[]);
  const toggleTheme = () => {
    const next = theme==="dark"?"light":"dark";
    setTheme(next);
    document.documentElement.setAttribute("data-theme",next);
    try { localStorage.setItem("componi-theme",next); } catch {}
  };
  useEffect(()=>{ document.documentElement.setAttribute("data-theme",theme); },[theme]);

  const isDesktop = mq >= 1024;

  if (isDesktop) return (
    <div style={{display:"flex",minHeight:"100vh",background:"var(--bg-canvas)"}}>
      <LeftSidebar theme={theme} toggleTheme={toggleTheme}/>
      <ComponentDetail theme={theme} toggleTheme={toggleTheme}/>
    </div>
  );

  return (
    <div style={{minHeight:"100vh",background:"var(--bg-canvas)",display:"flex",flexDirection:"column"}}>
      <MobileTopBar theme={theme} toggleTheme={toggleTheme}/>
      <ComponentDetail theme={theme} toggleTheme={toggleTheme}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
