      </span>
    </div>
  );
}

/* ─── Avatar ─── */
function Av({ name="?", size=36 }) {
  const c = avColor(name);
  return (
    <div style={{
      width:size, height:size, borderRadius:"50%", flexShrink:0,
      background:`linear-gradient(135deg,${c} 0%,rgba(0,0,0,0.38) 100%)`,

      color:"#fff", font:`600 ${Math.round(size*0.42)}px var(--font-ui)`,
    }}>{name[0]?.toUpperCase()}</div>
  );
}

/* ─── Left Sidebar ─── */
function LeftSidebar({ theme, toggleTheme }) {
  const navItems = [

    { k:"explore", icon:IC.compass, label:"Explore" },
    { k:"notifs",  icon:IC.bellFill,label:"Notifications", active:true, badge:5 },

            border:"none",

/* ─── Notification Row ─── */
function NotifRow({ item, isLast }) {
  const [read, setRead] = useState(!item.unread);
  const meta = TYPE_META[item.type];
  const thumb = item.thumb ? (THUMBS[item.thumb] || DEFAULT_THUMB) : null;

  return (
    <div
      onClick={() => setRead(true)}
      style={{
        display:"flex", alignItems:"flex-start", gap:12,
        padding:"16px 24px",
        borderBottom: isLast ? "none" : "1px solid var(--border-subtle)",
        background: !read ? "var(--bg-elevated)" : "transparent",
        borderLeft: !read ? "3px solid var(--accent)" : "3px solid transparent",
        cursor:"pointer",
        transition:"background 0.15s",
        position:"relative",
      }}
      onMouseEnter={e=>{ if(read) e.currentTarget.style.background="var(--bg-surface)"; }}
      onMouseLeave={e=>{ if(read) e.currentTarget.style.background="transparent"; }}
    >
      {/* Unread dot */}
      {!read && (
        <div style={{
          position:"absolute",top:20,right:24,
          width:7,height:7,borderRadius:"50%",
          background:"var(--accent)",
          flexShrink:0,
        }}/>
      )}

      {/* Avatar + type icon badge */}
      <div style={{position:"relative",flexShrink:0}}>
        <Av name={item.actor} size={36}/>
        <div style={{
          position:"absolute",bottom:-2,right:-2,
          width:18,height:18,borderRadius:"50%",
          background:"var(--bg-canvas)",
          border:"1.5px solid var(--border-strong)",
          display:"flex",alignItems:"center",justifyContent:"center",
          color:meta.color,
        }}>
          {meta.icon}
        </div>
      </div>

      {/* Content */}
      <div style={{flex:1,minWidth:0}}>
        {/* Main line */}
        <div style={{font:"400 13px var(--font-ui)",color:"var(--fg-secondary)",lineHeight:1.5,textWrap:"pretty"}}>
          <span style={{fontWeight:600,color:"var(--fg-primary)"}}>{item.actor}</span>
          {" "}{item.action}{item.target && <>{" "}<span style={{fontWeight:600,color:"var(--fg-primary)"}}>{item.target}</span></>}
        </div>
        {/* Time */}
        <div style={{font:"400 12px var(--font-ui)",color:"var(--fg-muted)",marginTop:2}}>{item.time}</div>
        {/* Quote block */}
        {item.quote && (
          <div style={{
            marginTop:8,
            padding:"8px 12px",
            background:"var(--bg-elevated)",
            border:"1px solid var(--border-subtle)",
            borderRadius:6,
            font:"400 13px var(--font-ui)",
            color:"var(--fg-secondary)",
            lineHeight:1.5,
            display:"-webkit-box",
            WebkitLineClamp:2,
            WebkitBoxOrient:"vertical",
            overflow:"hidden",
          }}>
            "{item.quote}"
          </div>
        )}
      </div>

      {/* Thumbnail */}
      {thumb && (
        <div style={{flexShrink:0,marginLeft:4}}>
          {thumb}
        </div>
      )}
    </div>
  );
}

/* ─── Notifications Center ─── */
function NotificationsCenter({ activeTab, setActiveTab, notifications }) {
  const filtered = notifications.filter(n => {
    if (activeTab === "all") return true;
    if (activeTab === "unread") return n.unread;
    if (activeTab === "likes") return n.type === "like";
    if (activeTab === "comments") return n.type === "comment" || n.type === "reply" || n.type === "mention";
    if (activeTab === "follows") return n.type === "follow";
    return true;
  });

  return (
    <div style={{flex:1,minWidth:0,display:"flex",flexDirection:"column",height:"100vh",overflowY:"auto"}}>

      {/* Page header */}
      <div style={{
        padding:"24px 24px 16px",
        display:"flex",alignItems:"center",justifyContent:"space-between",
        borderBottom:"1px solid var(--border-subtle)",
        background:"var(--bg-canvas)",
        position:"sticky",top:0,zIndex:20,
      }}>
        <h1 style={{font:"700 28px var(--font-ui)",color:"var(--fg-primary)",letterSpacing:"-0.02em"}}>Notifications</h1>
        <button style={{
          height:32,padding:"0 14px",
          background:"transparent",border:"none",
          color:"var(--fg-muted)",
          font:"500 13px var(--font-ui)",
          borderRadius:6,
          transition:"color 0.12s",
          cursor:"pointer",
        }}
          onMouseEnter={e=>e.currentTarget.style.color="var(--fg-secondary)"}
          onMouseLeave={e=>e.currentTarget.style.color="var(--fg-muted)"}
        >
          Mark all as read
        </button>
      </div>

      {/* Filter tabs */}
      <div style={{
        display:"flex",gap:0,
        padding:"0 24px",
        borderBottom:"1px solid var(--border-subtle)",
        background:"var(--bg-canvas)",
        position:"sticky",top:73,zIndex:19,
        overflowX:"auto",
        scrollbarWidth:"none",
      }}>
        {TABS.map(tab=>{
          const active = activeTab === tab.k;
          return (
            <button key={tab.k} onClick={()=>setActiveTab(tab.k)} style={{
              display:"flex",alignItems:"center",gap:6,
              height:44,padding:"0 4px",
              marginRight:20,
              background:"transparent",border:"none",
              color:active?"var(--fg-primary)":"var(--fg-muted)",
              font:`${active?"600":"500"} 13px var(--font-ui)`,
              borderBottom:`2px solid ${active?"var(--accent)":"transparent"}`,
              cursor:"pointer",
              transition:"color 0.12s,border-color 0.12s",
              flexShrink:0,
            }}>
              {tab.label}
              {tab.count && (
                <span style={{
                  minWidth:18,height:18,padding:"0 5px",
                  borderRadius:999,
                  background:active?"var(--accent)":"var(--bg-elevated)",
                  color:active?"#fff":"var(--fg-muted)",
                  font:"600 10px var(--font-mono)",
                  display:"inline-flex",alignItems:"center",justifyContent:"center",
                  transition:"background 0.12s,color 0.12s",
                }}>{tab.count}</span>
              )}
            </button>
          );
        })}
      </div>

      {/* List */}
      {filtered.length > 0 ? (
        <div>
          {filtered.map((n,i)=>(
            <NotifRow key={n.id} item={n} isLast={i===filtered.length-1}/>
          ))}
        </div>
      ) : (
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",flex:1,gap:8,padding:"80px 24px",color:"var(--fg-muted)"}}>
          <div style={{opacity:0.4}}>
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
          </div>
          <div style={{font:"500 14px var(--font-ui)",color:"var(--fg-secondary)"}}>No notifications here</div>
        </div>
      )}
    </div>
  );
}

/* ─── App ─── */
function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [activeTab, setActiveTab] = useState(tweaks.activeTab);

  const theme = tweaks.theme;

  // Keep activeTab in sync with tweaks
  useEffect(() => { setActiveTab(tweaks.activeTab); }, [tweaks.activeTab]);

  useEffect(() => {
    document.documentElement.setAttribute("data-theme", theme);
  }, [theme]);

  const toggleTheme = () => setTweak("theme", theme === "dark" ? "light" : "dark");

  const handleTabChange = (tab) => {
    setActiveTab(tab);
    setTweak("activeTab", tab);
  };

  return (
    <div style={{display:"flex",height:"100vh",overflow:"hidden",background:"var(--bg-canvas)"}}>
      <LeftSidebar theme={theme} toggleTheme={toggleTheme} />
      <NotificationsCenter
        activeTab={activeTab}
        setActiveTab={handleTabChange}
        notifications={NOTIFICATIONS}
      />

      <TweaksPanel>
        <TweakSection label="Theme" />
        <TweakRadio id="theme" options={["dark","light"]} value={tweaks.theme} onChange={v => setTweak("theme", v)} />
        <TweakSection label="Active tab" />
        <TweakSelect id="activeTab" options={["all","unread","likes","comments","follows"]} value={tweaks.activeTab} onChange={v => setTweak("activeTab", v)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
