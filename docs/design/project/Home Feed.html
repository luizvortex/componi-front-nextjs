/* ─── Helpers ─── */
const AV_PALETTE = ["#A31F37","#4F46E5","#0EA5E9","#10B981","#D97706","#7C3AED","#DB2777","#059669"];
function avColor(n=""){ let h=0; for(let i=0;i<n.length;i++) h=(h*31+n.charCodeAt(i))>>>0; return AV_PALETTE[h%AV_PALETTE.length]; }
function fmtNum(n){ return n>=1000?`${(n/1000).toFixed(1)}k`:String(n); }

function Logo({ size=18 }) {
  return (
    <div style={{display:"inline-flex",alignItems:"baseline",font:`600 ${size}px var(--font-ui)`,letterSpacing:"-0.04em",color:"var(--fg-primary)",userSelect:"none"}}>
      compon<span style={{display:"inline-block",position:"relative"}}>i<span style={{position:"absolute",left:`${size*0.15}px`,top:`${size*0.15}px`,width:`${Math.max(4,size*0.2)}px`,height:`${Math.max(4,size*0.2)}px`,background:"var(--accent)",borderRadius:"1px"}}/></span>
    </div>
  );
}

function Av({ name="M", size=36, color, ring=false, ringColor="var(--accent)", gap=2 }) {
  const c = color || avColor(name);
  return (
    <div style={{
      width:size, height:size, borderRadius:"50%", flexShrink:0,
      background:`linear-gradient(135deg,${c} 0%,rgba(0,0,0,0.45) 100%)`,
      display:"inline-flex",alignItems:"center",justifyContent:"center",
      color:"#fff",font:`600 ${Math.round(size*0.42)}px var(--font-ui)`,
      outline: ring ? `2px solid ${ringColor}` : "none",
      outlineOffset: gap,
    }}>{name[0]?.toUpperCase()}</div>
  );
}

/* ─── Post ─── */
function Post({ item, compact }) {
  const [liked, setLiked] = useState(item.liked);
  const [likeCount, setLikeCount] = useState(item.likes);
  const [saved, setSaved] = useState(false);
  const [showHeart, setShowHeart] = useState(false);
  const lastTap = useRef(0);
  const doLike = () => { setLiked(v => { setLikeCount(c => c+(v?-1:1)); return !v; }); };
  const onImgTap = () => {
    const now = Date.now();
    if (now - lastTap.current < 350) {
      if (!liked) { setLiked(true); setLikeCount(c=>c+1); }
      setShowHeart(true); setTimeout(()=>setShowHeart(false), 800);
    }
    lastTap.current = now;
  };
  const PreviewCmp = POST_PREVIEWS[item.seed % POST_PREVIEWS.length];
  const previewH = compact ? 260 : 300;

  return (
    <article style={{borderBottom:"1px solid var(--border-subtle)"}}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"12px 16px"}}>
        <Av name={item.name} size={34} ring={liked} />
        <div style={{flex:1,minWidth:0}}>
          <div style={{font:"600 13px var(--font-ui)",color:"var(--fg-primary)"}}>{item.name}</div>
          <div style={{font:"400 12px var(--font-mono)",color:"var(--fg-muted)"}}>@{item.author} · {item.time}</div>
        </div>
        <span style={{padding:"3px 10px",borderRadius:999,font:"500 11px var(--font-mono)",background:"var(--bg-elevated)",color:"var(--fg-secondary)",border:"1px solid var(--border-subtle)"}}>{item.fw}</span>
        <button style={{width:30,height:30,display:"inline-flex",alignItems:"center",justifyContent:"center",background:"transparent",border:"none",color:"var(--fg-muted)",borderRadius:6}}>{IC.more}</button>
      </div>

      {/* Preview */}
      <div onClick={onImgTap} style={{position:"relative",width:"100%",cursor:"pointer",userSelect:"none"}}>
        <PreviewCmp h={previewH} />
        <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",pointerEvents:"none",opacity:showHeart?1:0,transition:"opacity 0.12s"}}>
          <div style={{transform:showHeart?"scale(1)":"scale(0.5)",transition:"transform 0.15s cubic-bezier(0.34,1.56,0.64,1)",filter:"drop-shadow(0 2px 16px rgba(0,0,0,0.5))"}}>
            <svg width="72" height="72" viewBox="0 0 24 24" fill="white" stroke="white" strokeWidth="0.5"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>

      </div>
    </article>
  );
}

/* ─── App ─── */
function App() {
  const [theme, setTheme] = useState(()=>{
    try { return localStorage.getItem("componi-theme")||"dark"; } catch { return "dark"; }
  });
  const [mq, setMq] = useState(window.innerWidth);

  useEffect(()=>{
    const onR=()=>setMq(window.innerWidth);
    window.addEventListener("resize",onR);
    return ()=>window.removeEventListener("resize",onR);
  },[]);

  const toggleTheme = () => {
    const next = theme==="dark"?"light":"dark";
    setTheme(next);
    document.documentElement.setAttribute("data-theme",next);
    try { localStorage.setItem("componi-theme",next); } catch {}
  };

  useEffect(()=>{ document.documentElement.setAttribute("data-theme",theme); },[theme]);

  const isDesktop = mq >= 1024;

  /* ── DESKTOP layout ── */
  if (isDesktop) return (
    <div style={{display:"flex",minHeight:"100vh",background:"var(--bg-canvas)"}}>
      <LeftSidebar theme={theme} toggleTheme={toggleTheme} />

      {/* Center feed */}
      <main style={{flex:1,maxWidth:560,minWidth:0,borderRight:"1px solid var(--border-subtle)"}}>
        {/* mini topbar for center col */}
        <div style={{position:"sticky",top:0,zIndex:20,height:52,display:"flex",alignItems:"center",
          padding:"0 16px",borderBottom:"1px solid var(--border-subtle)",background:"var(--bg-canvas)",backdropFilter:"blur(8px)"}}>
          <h2 style={{font:"600 15px var(--font-ui)",color:"var(--fg-primary)"}}>Following</h2>
          <span style={{marginLeft:8,font:"400 12px monospace",color:"var(--fg-muted)"}}>· 147 today</span>
        </div>

        <StoriesRow />
        {POSTS.map(p=><Post key={p.id} item={p} compact />)}
        <div style={{padding:"24px 0",display:"flex",justifyContent:"center"}}>
          <button style={{height:34,padding:"0 24px",borderRadius:6,background:"transparent",border:"1px solid var(--border-subtle)",color:"var(--fg-secondary)",font:"500 13px var(--font-ui)"}}>Load more</button>
        </div>
      </main>

      <RightRail />
    </div>
  );

  /* ── MOBILE layout ── */
  return (
    <div style={{minHeight:"100vh",background:"var(--bg-canvas)",display:"flex",flexDirection:"column"}}>
      <MobileTopBar theme={theme} toggleTheme={toggleTheme} />
      <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center"}}>
        <div style={{width:"100%",maxWidth:480,paddingBottom:68}}>
          <StoriesRow />
          {POSTS.map(p=><Post key={p.id} item={p} />)}
          <div style={{padding:"24px 0",display:"flex",justifyContent:"center"}}>
            <button style={{height:34,padding:"0 24px",borderRadius:6,background:"transparent",border:"1px solid var(--border-subtle)",color:"var(--fg-secondary)",font:"500 13px var(--font-ui)"}}>Load more</button>
          </div>
        </div>
      </div>
      <BottomNav />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
