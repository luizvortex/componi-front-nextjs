  { tokens: [{ t:"  placeholder", c:"plain" }, { t:"?:", c:"plain" }, { t:" string", c:"kw" }] },

  { tokens: [{ t:"    inputRef.current?.", c:"plain" }, { t:"focus", c:"type" }, { t:"()", c:"plain" }] },
  { tokens: [{ t:"  }, [])", c:"plain" }] },
  { tokens: [] },
  { tokens: [{ t:"  return", c:"kw" }, { t:" (", c:"plain" }] },

  { tokens: [{ t:"      <", c:"plain" }, { t:"input", c:"tag" }] },

const TOKEN_COLORS = {
  kw:      "var(--accent-hover)",
  str:     "#34D399",
  comment: "var(--fg-muted)",
  type:    "#93C5FD",
  tag:     "#F9A8D4",
  expr:    "#FCD34D",
  num:     "#FB923C",
  plain:   "var(--fg-primary)",
};

function CodeLine({ lineNum, tokens, active }) {
  return (
    <div style={{
      display:"flex", alignItems:"stretch", minHeight:20,
      background: active ? "rgba(139,26,47,0.12)" : "transparent",
      borderLeft: active ? "2px solid var(--accent)" : "2px solid transparent",
    }}>
      <span style={{
        width:40, flexShrink:0, textAlign:"right", paddingRight:16,
        font:`400 12px var(--font-mono)`, color:"var(--fg-muted)",
        lineHeight:"20px", userSelect:"none",
      }}>{lineNum}</span>
      <span style={{font:`400 13px var(--font-mono)`, lineHeight:"20px", whiteSpace:"pre", flex:1}}>
        {tokens.map((tk, i) => (
          <span key={i} style={{color: TOKEN_COLORS[tk.c] || "var(--fg-primary)"}}>{tk.t}</span>
        ))}
      </span>
    </div>
  );
}

/* ─── Live Preview: Command Palette sketch ─── */
function LivePreview() {
  const [activeCmd, setActiveCmd] = useState(0);
  const cmds = [
    { label:"Go to file…",      kbd:"⌘P" },
    { label:"Command Palette",  kbd:"⌘⇧P", active:true },
    { label:"Open terminal",    kbd:"⌃`" },

      <div style={{

        background:"#12141A",
        border:"1px solid #2E323B",

        overflow:"hidden",
        boxShadow:"0 24px 64px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.04)",
      }}>
        {/* Search row */}
        <div style={{padding:"10px 14px", borderBottom:"1px solid #23262D", display:"flex", alignItems:"center", gap:8}}>

            <span style={{display:"inline-block", width:1, height:13, background:"var(--accent)", marginLeft:1, animation:"progress-pulse 1s ease-in-out infinite"}}/>

          <span style={{font:"500 10px 'Geist Mono',monospace", color:"#71717A", padding:"2px 6px", background:"#1A1D24", borderRadius:4, border:"1px solid #23262D"}}>Esc</span>
        </div>
        {/* Results */}
        {cmds.map((cmd, i) => (
          <div
            key={i}
            onClick={() => setActiveCmd(i)}
            style={{
              padding:"8px 14px", display:"flex", alignItems:"center", gap:10,
              background: i === activeCmd ? "rgba(139,26,47,0.18)" : "transparent",
              borderLeft: i === activeCmd ? "2px solid #8B1A2F" : "2px solid transparent",
              cursor:"pointer", transition:"background 0.1s",

/* ─── Top progress bar ─── */
function ProgressBar({ active }) {
  return (
    <div style={{
      position:"absolute", top:0, left:0, right:0, height:3,
      background:"var(--bg-elevated)",
      overflow:"hidden",
      opacity: active ? 1 : 0,
      transition:"opacity 0.2s",
      zIndex:10,
    }}>
      <div style={{
        position:"absolute", top:0, left:"-100%", width:"60%", height:"100%",
        background:"var(--accent)",
        animation: active ? "progress-slide 1.4s ease-in-out infinite" : "none",
        boxShadow:"0 0 12px var(--accent)",
      }}/>
    </div>
  );
}

/* ─── Main App ─── */
function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  const mode         = tweaks.mode;           // "new" | "edit"
  const showBanner   = tweaks.showBanner;
  const previewUpdating = tweaks.previewUpdating;

  const [name, setName]       = useState("CommandPalette");
  const [framework, setFW]    = useState("React");
  const [tags, setTags]       = useState(["search","modal"]);
  const [isPublic, setPublic] = useState(true);
  const [bannerDismissed, setBannerDismissed] = useState(false);
  const [changelog, setChangelog] = useState("");
  const [splitPct, setSplitPct]   = useState(tweaks.splitRatio);

  // Sync split ratio from tweaks
  useEffect(() => { setSplitPct(tweaks.splitRatio); }, [tweaks.splitRatio]);

  /* drag resize */
  const dragging = useRef(false);
  const containerRef = useRef(null);
  const onHandleDown = useCallback((e) => {
    e.preventDefault();
    dragging.current = true;
    const onMove = (e) => {
      if (!dragging.current || !containerRef.current) return;
      const rect = containerRef.current.getBoundingClientRect();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const pct = ((clientX - rect.left) / rect.width) * 100;
      setSplitPct(Math.min(75, Math.max(30, pct)));
    };
    const onUp = () => { dragging.current = false; document.removeEventListener("mousemove", onMove); document.removeEventListener("mouseup", onUp); };
    document.addEventListener("mousemove", onMove);
    document.addEventListener("mouseup", onUp);
  }, []);

  const showBannerFinal = showBanner && !bannerDismissed && mode === "new";
  const isEdit = mode === "edit";

  return (
    <div style={{height:"100vh", display:"flex", flexDirection:"column", background:"var(--bg-canvas)", overflow:"hidden"}}>

      {/* ── TOP BAR ── */}
      <header style={{
        height:48, flexShrink:0,
        display:"flex", alignItems:"center", gap:12,
        padding:"0 16px",
        borderBottom:"1px solid var(--border-subtle)",
        background:"var(--bg-canvas)",
        zIndex:30,
      }}>
        {/* Logo + breadcrumb */}
        <div style={{display:"flex", alignItems:"center", gap:8}}>
          {IC.logo(17)}
          <span style={{color:"var(--border-strong)", fontSize:14}}>/</span>
          <span style={{font:"400 13px var(--font-ui)", color:"var(--fg-muted)"}}>yourhandle</span>
          <span style={{color:"var(--border-strong)", fontSize:14}}>/</span>
          <span style={{font:"500 13px var(--font-ui)", color:"var(--fg-secondary)"}}>
            {isEdit ? "command-palette" : "new component"}
          </span>
          {isEdit && (
            <span style={{
              padding:"1px 7px", borderRadius:4,
              font:"600 11px var(--font-mono)",
              background:"var(--bg-elevated)",
              color:"var(--fg-muted)",
              border:"1px solid var(--border-subtle)",
            }}>v2</span>
          )}
        </div>

        <div style={{flex:1}}/>

        {/* Right actions */}
        <div style={{display:"flex", alignItems:"center", gap:8}}>
          <button style={{
            height:32, padding:"0 14px", borderRadius:6,
            background:"transparent",
            border:"1px solid var(--border-strong)",
            color:"var(--fg-secondary)",
            font:"500 13px var(--font-ui)",
            transition:"border-color 0.12s, color 0.12s",
          }}
            onMouseEnter={e=>{ e.currentTarget.style.borderColor="var(--fg-muted)"; e.currentTarget.style.color="var(--fg-primary)"; }}
            onMouseLeave={e=>{ e.currentTarget.style.borderColor="var(--border-strong)"; e.currentTarget.style.color="var(--fg-secondary)"; }}
          >Save draft</button>
          <button style={{
            height:32, padding:"0 16px", borderRadius:6,
            background:"var(--accent)",
            border:"none",
            color:"#fff",
            font:"600 13px var(--font-ui)",
            opacity: name.trim() ? 1 : 0.45,
            cursor: name.trim() ? "pointer" : "not-allowed",
            transition:"background 0.12s, opacity 0.12s",
            display:"flex", alignItems:"center", gap:6,
          }}
            onMouseEnter={e=>{ if(name.trim()) e.currentTarget.style.background="var(--accent-hover)"; }}
            onMouseLeave={e=>{ e.currentTarget.style.background="var(--accent)"; }}
          >
            {isEdit ? "Update →" : "Publish →"}
          </button>
        </div>
      </header>

      {/* ── SPLIT PANE ── */}
      <div ref={containerRef} style={{
        flex:1, display:"flex", overflow:"hidden",
        position:"relative",
      }}>

        {/* LEFT: Editor */}
        <div style={{
          width:`${splitPct}%`, flexShrink:0,
          display:"flex", flexDirection:"column",
          borderRight:"1px solid var(--border-subtle)",
          overflow:"hidden",
          background:"var(--bg-canvas)",
        }}>
          {/* Editor header */}
          <div style={{
            height:36, flexShrink:0,
            display:"flex", alignItems:"center", gap:8,
            padding:"0 12px 0 0",
            borderBottom:"1px solid var(--border-subtle)",
            background:"var(--bg-surface)",
          }}>
            {/* File tab */}
            <div style={{
              height:"100%",
              display:"flex", alignItems:"center", gap:8,
              padding:"0 14px",
              borderRight:"1px solid var(--border-subtle)",
              background:"var(--bg-canvas)",
              borderBottom:"2px solid var(--accent)",
            }}>
              <span style={{font:"400 13px var(--font-mono)", color:"var(--fg-secondary)"}}>App.tsx</span>
              <span style={{
                padding:"1px 6px", borderRadius:3,
                font:"500 11px var(--font-mono)",
                background:"var(--bg-elevated)",
                color:"var(--fg-muted)",
                border:"1px solid var(--border-subtle)",
              }}>TSX</span>
            </div>
            <div style={{flex:1}}/>
            {/* Minimap lines (decorative) */}
            <div style={{display:"flex", flexDirection:"column", gap:1.5, opacity:0.3, width:20, flexShrink:0}}>
              {[100,60,80,40,90,55,70,45].map((w,i)=>(
                <div key={i} style={{height:1.5, width:`${w}%`, background:"var(--fg-muted)", borderRadius:1}}/>
              ))}
            </div>
          </div>

          {/* Code area */}
          <div style={{
            flex:1, overflowY:"auto", overflowX:"auto",
            padding:"10px 0",
            background:"var(--bg-canvas)",
          }}>
            {CODE_LINES.map((line, i) => (
              <CodeLine
                key={i}
                lineNum={i + 1}
                tokens={line.tokens}
                active={i === 14 || i === 15}
              />
            ))}
          </div>
        </div>

        {/* RESIZE HANDLE */}
        <div
          onMouseDown={onHandleDown}
          style={{
            width:4, flexShrink:0,
            background:"var(--border-subtle)",
            cursor:"col-resize",
            transition:"background 0.12s",
            position:"relative", zIndex:5,
            userSelect:"none",
          }}
          onMouseEnter={e=>e.currentTarget.style.background="rgba(139,26,47,0.35)"}
          onMouseLeave={e=>e.currentTarget.style.background="var(--border-subtle)"}
        />

        {/* RIGHT: Preview */}
        <div style={{
          flex:1, display:"flex", flexDirection:"column",
          overflow:"hidden",
          background:"var(--bg-surface)",
        }}>
          {/* Preview header */}
          <div style={{
            height:36, flexShrink:0,
            display:"flex", alignItems:"center", gap:8,
            padding:"0 14px",
            borderBottom:"1px solid var(--border-subtle)",
            background:"var(--bg-surface)",
            position:"relative",
          }}>
            <ProgressBar active={previewUpdating} />
            <span style={{font:"500 13px var(--font-ui)", color:"var(--fg-muted)"}}>Preview</span>
            {previewUpdating && (
              <span style={{color:"var(--fg-muted)", display:"inline-flex"}}>{IC.spinner}</span>
            )}
            <div style={{flex:1}}/>
            <button style={{
              height:26, padding:"0 10px", borderRadius:5,
              background:"transparent",
              border:"1px solid var(--border-subtle)",
              color:"var(--fg-muted)",
              font:"500 12px var(--font-ui)",
              display:"flex", alignItems:"center", gap:5,
              transition:"border-color 0.12s, color 0.12s",
            }}
              onMouseEnter={e=>{ e.currentTarget.style.borderColor="var(--border-strong)"; e.currentTarget.style.color="var(--fg-secondary)"; }}
              onMouseLeave={e=>{ e.currentTarget.style.borderColor="var(--border-subtle)"; e.currentTarget.style.color="var(--fg-muted)"; }}
            >
              {React.cloneElement(IC.reload, {width:12, height:12})}
              Reload
            </button>
          </div>

          {/* Preview content */}
          <div style={{
            flex:1, padding:12, overflow:"hidden",
            display:"flex", flexDirection:"column",
          }}>
            <div style={{
              flex:1,
              background:"var(--bg-elevated)",
              borderRadius:8,
              overflow:"hidden",
              border:"1px solid var(--border-subtle)",
              position:"relative",
            }}>
              <LivePreview />
            </div>
          </div>
        </div>
      </div>

      {/* ── CHANGELOG (edit mode only) ── */}
      {isEdit && (
        <div style={{
          flexShrink:0,
          padding:"10px 16px",
          borderTop:"1px solid var(--border-subtle)",
          background:"var(--bg-surface)",
          animation:"slide-in-bottom 0.18s ease-out",
        }}>
          <textarea
            value={changelog}
            onChange={e => setChangelog(e.target.value)}
            placeholder="What changed in v2?"
            style={{
              width:"100%", height:64,
              background:"var(--bg-elevated)",
              border:"1px solid var(--border-subtle)",
              borderRadius:6,
              padding:"8px 12px",
              font:"400 13px var(--font-ui)",
              color:"var(--fg-primary)",
              resize:"none",
              lineHeight:1.5,
              transition:"border-color 0.12s",
            }}
            onFocus={e => e.currentTarget.style.borderColor="var(--accent)"}
            onBlur={e => e.currentTarget.style.borderColor="var(--border-subtle)"}
          />
        </div>
      )}

      {/* ── VALIDATION BANNER ── */}
      {showBannerFinal && (
        <div style={{
          flexShrink:0,
          display:"flex", alignItems:"center", gap:8,
          padding:"8px 16px",
          borderTop:"1px solid rgba(245,158,11,0.3)",
          background:"rgba(245,158,11,0.08)",
          animation:"slide-in-bottom 0.18s ease-out",
        }}>
          <span style={{color:"var(--warn)", display:"inline-flex", flexShrink:0}}>{IC.warn}</span>
          <span style={{font:"400 13px var(--font-ui)", color:"var(--fg-secondary)", flex:1, minWidth:0}}>
            3 dependencies have unpinned versions —{" "}
            <span style={{
              color:"var(--accent-hover)",
              textDecoration:"underline",
              cursor:"pointer",
              textUnderlineOffset:2,
            }}>publish anyway?</span>
          </span>
          <button
            onClick={() => setBannerDismissed(true)}
            style={{
              width:24, height:24, borderRadius:4, border:"none",
              background:"transparent",
              color:"var(--fg-muted)",
              display:"inline-flex", alignItems:"center", justifyContent:"center",
              flexShrink:0, transition:"color 0.12s, background 0.12s",
            }}
            onMouseEnter={e=>{ e.currentTarget.style.background="var(--bg-elevated)"; e.currentTarget.style.color="var(--fg-primary)"; }}
            onMouseLeave={e=>{ e.currentTarget.style.background="transparent"; e.currentTarget.style.color="var(--fg-muted)"; }}
          >{IC.x}</button>
        </div>
      )}

      {/* ── BOTTOM BAR ── */}
      <div style={{
        height:56, flexShrink:0,
        display:"flex", alignItems:"center", gap:8,
        padding:"0 16px",
        borderTop:"1px solid var(--border-subtle)",
        background:"var(--bg-surface)",
      }}>

        {/* Name input */}
        <input
          value={name}
          onChange={e => setName(e.target.value)}
          placeholder="Component name…"
          style={{
            width:180, height:32, flexShrink:0,
            background:"var(--bg-elevated)",
            border:"1px solid var(--border-subtle)",
            borderRadius:6,
            padding:"0 10px",
            font:"400 13px var(--font-ui)",
            color:"var(--fg-primary)",
            transition:"border-color 0.12s",
          }}
          onFocus={e => e.currentTarget.style.borderColor="var(--accent)"}
          onBlur={e => e.currentTarget.style.borderColor="var(--border-subtle)"}
        />

        {/* Framework dropdown */}
        <div style={{
          position:"relative", flexShrink:0,
        }}>
          <select
            value={framework}
            onChange={e => setFW(e.target.value)}
            style={{
              height:32, padding:"0 28px 0 10px",
              background:"var(--bg-elevated)",
              border:"1px solid var(--border-subtle)",
              borderRadius:6,
              font:"400 13px var(--font-ui)",
              color:"var(--fg-secondary)",
              appearance:"none", WebkitAppearance:"none",
              cursor:"pointer",
              transition:"border-color 0.12s",
            }}
            onFocus={e => e.currentTarget.style.borderColor="var(--accent)"}
            onBlur={e => e.currentTarget.style.borderColor="var(--border-subtle)"}
          >
            {["React","Vue","Svelte","Angular","Solid"].map(fw => (
              <option key={fw} value={fw}>{fw}</option>
            ))}
          </select>
          <span style={{
            position:"absolute", right:8, top:"50%", transform:"translateY(-50%)",
            color:"var(--fg-muted)", pointerEvents:"none",
          }}>{IC.chevronDown}</span>
        </div>

        {/* Tags */}
        <div style={{display:"flex", alignItems:"center", gap:6, minWidth:0}}>
          {/* Add tags pill */}
          <button style={{
            height:28, padding:"0 10px",
            display:"inline-flex", alignItems:"center", gap:5,
            background:"transparent",
            border:"1px dashed var(--border-strong)",
            borderRadius:999,
            font:"500 12px var(--font-ui)",
            color:"var(--fg-muted)",
            flexShrink:0,
            transition:"border-color 0.12s, color 0.12s",
          }}
            onMouseEnter={e=>{ e.currentTarget.style.borderColor="var(--fg-muted)"; e.currentTarget.style.color="var(--fg-secondary)"; }}
            onMouseLeave={e=>{ e.currentTarget.style.borderColor="var(--border-strong)"; e.currentTarget.style.color="var(--fg-muted)"; }}
          >
            {IC.plus}<span>Add tag</span>
          </button>

          {/* Existing tag chips */}
          {tags.map(tag => (
            <span key={tag} style={{
              display:"inline-flex", alignItems:"center", gap:5,
              height:26, padding:"0 8px 0 9px",
              background:"var(--bg-elevated)",
              border:"1px solid var(--border-subtle)",
              borderRadius:999,
              font:"500 12px var(--font-mono)",
              color:"var(--fg-secondary)",
              flexShrink:0,
            }}>
              <span style={{color:"var(--accent)", opacity:0.7, display:"inline-flex"}}>{IC.hash}</span>
              {tag}
              <button
                onClick={() => setTags(t => t.filter(x => x !== tag))}
                style={{
                  display:"inline-flex", alignItems:"center", justifyContent:"center",
                  width:14, height:14, borderRadius:"50%",
                  background:"transparent", border:"none",
                  color:"var(--fg-muted)", padding:0,
                  cursor:"pointer",
                  transition:"color 0.1s",
                }}
                onMouseEnter={e => e.currentTarget.style.color="var(--fg-primary)"}
                onMouseLeave={e => e.currentTarget.style.color="var(--fg-muted)"}
              >{IC.x}</button>
            </span>
          ))}
        </div>

        <div style={{flex:1}}/>

        {/* Version badge (edit mode) */}
        {isEdit && (
          <span style={{
            padding:"3px 9px", borderRadius:5,
            font:"600 12px var(--font-mono)",
            background:"var(--bg-elevated)",
            color:"var(--fg-muted)",
            border:"1px solid var(--border-subtle)",
            flexShrink:0,
          }}>v2</span>
        )}

        {/* Public toggle */}
        <div style={{display:"flex", alignItems:"center", gap:8, flexShrink:0}}>
          <span style={{font:"500 12px var(--font-ui)", color:"var(--fg-secondary)"}}>Public</span>
          <div
            onClick={() => setPublic(v => !v)}
            style={{
              width:36, height:20, borderRadius:999,
              background: isPublic ? "var(--accent)" : "var(--bg-elevated)",
              border: `1px solid ${isPublic ? "var(--accent)" : "var(--border-strong)"}`,
              position:"relative", cursor:"pointer",
              transition:"background 0.15s, border-color 0.15s",
            }}
          >
            <div style={{
              position:"absolute",
              top:2, left: isPublic ? 17 : 2,
              width:14, height:14, borderRadius:"50%",
              background:"#fff",
              transition:"left 0.15s cubic-bezier(0.34,1.56,0.64,1)",
              boxShadow:"0 1px 3px rgba(0,0,0,0.3)",
            }}/>
          </div>
        </div>

        {/* Publish button */}
        <button style={{
          height:34, padding:"0 18px", borderRadius:6,
          background: "var(--accent)",
          border:"none",
          color:"#fff",
          font:"600 13px var(--font-ui)",
          opacity: name.trim() ? 1 : 0.45,
          cursor: name.trim() ? "pointer" : "not-allowed",
          transition:"background 0.12s, opacity 0.12s",
          flexShrink:0,
        }}
          onMouseEnter={e=>{ if(name.trim()) e.currentTarget.style.background="var(--accent-hover)"; }}
          onMouseLeave={e=>{ e.currentTarget.style.background="var(--accent)"; }}
        >
          {isEdit ? "Update →" : "Publish →"}
        </button>
      </div>

      {/* ── TWEAKS PANEL ── */}
      <TweaksPanel>
        <TweakSection label="Mode">
          <TweakRadio id="mode" options={["new","edit"]} value={tweaks.mode} onChange={v => setTweak("mode", v)} />
        </TweakSection>
        <TweakSection label="Validation Banner">
          <TweakToggle id="showBanner" label="Show warning banner" value={tweaks.showBanner} onChange={v => { setTweak("showBanner", v); setBannerDismissed(false); }} />
        </TweakSection>
        <TweakSection label="Preview State">
          <TweakToggle id="previewUpdating" label="Loading / debounce active" value={tweaks.previewUpdating} onChange={v => setTweak("previewUpdating", v)} />
        </TweakSection>
        <TweakSection label="Split Ratio">
          <TweakSlider id="splitRatio" label="Editor width %" min={30} max={75} step={1} value={tweaks.splitRatio} onChange={v => setTweak("splitRatio", v)} />
        </TweakSection>
      </TweaksPanel>

    </div>
  );
}

/* ─── Progress bar keyframe ─── */
const styleEl = document.createElement("style");
styleEl.textContent = `
@keyframes progress-slide {
  0%   { left: -60%; }
  100% { left: 110%; }
}
`;
document.head.appendChild(styleEl);

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
