const AV_PALETTE = ["#A31F37","#4F46E5","#0EA5E9","#10B981","#D97706","#7C3AED","#DB2777","#059669"];
function avColor(n=""){ let h=0; for(let i=0;i<n.length;i++) h=(h*31+n.charCodeAt(i))>>>0; return AV_PALETTE[h%AV_PALETTE.length]; }
function fmtNum(n){ return n>=1000?`${(n/1000).toFixed(1)}k`:String(n); }

function Logo({ size=18 }) {

    </div>
  );
}

function Av({ name="?", size=36, color }) {
  const c = color || avColor(name);
  return (
    <div style={{
      width:size, height:size, borderRadius:"50%", flexShrink:0,

      color:"#fff", font:`600 ${Math.round(size*0.4)}px var(--font-ui)`,

}

function CompactCard({ item, isForks, dark }) {
  const [liked, setLiked] = useState(false);
  const PreviewCmp = PREVIEWS[item.name];
  return (
    <article style={{
      background:"var(--bg-surface)",
      border:"1px solid var(--border-subtle)",
      borderRadius:8,
      overflow:"hidden",
      transition:"border-color 0.15s, box-shadow 0.15s",
    }}
      onMouseEnter={e=>{ e.currentTarget.style.borderColor="var(--border-strong)"; e.currentTarget.style.boxShadow="var(--shadow-card)"; }}
      onMouseLeave={e=>{ e.currentTarget.style.borderColor="var(--border-subtle)"; e.currentTarget.style.boxShadow="none"; }}
    >
      {/* Preview thumbnail */}
      <div style={{height:140, overflow:"hidden", borderBottom:"1px solid var(--border-subtle)"}}>
        {PreviewCmp ? <PreviewCmp dark={dark} /> : (
          <div style={{width:"100%",height:"100%",background:"var(--bg-elevated)",display:"flex",alignItems:"center",justifyContent:"center"}}>
            <span style={{font:"400 11px var(--font-mono)",color:"var(--fg-muted)"}}>{item.name}</span>
          </div>
        )}
      </div>

      {/* Card body */}
      <div style={{padding:"10px 12px 8px"}}>
        {/* Title row */}
        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:6,marginBottom:isForks?2:6}}>
          <div style={{minWidth:0}}>
            <div style={{font:"600 13px var(--font-ui)",color:"var(--fg-primary)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.name}</div>
            {isForks && (
              <div style={{font:"400 11px var(--font-mono)",color:"var(--fg-muted)",marginTop:1}}>
                forked from <span style={{color:"var(--accent-hover)",cursor:"pointer"}}>@{item.forkedFrom}</span>
              </div>
            )}
          </div>
          <span style={{
            padding:"2px 7px", borderRadius:4, flexShrink:0,
            font:"500 10px var(--font-mono)",
            background:"var(--bg-elevated)",
            color:"var(--fg-muted)",
            border:"1px solid var(--border-subtle)",
          }}>{item.fw}</span>
        </div>

        {/* Tags */}
        <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:8}}>
          {item.tags.map(t=>(
            <span key={t} style={{
              display:"inline-flex",alignItems:"center",
              height:18,padding:"0 7px",
              background:"var(--bg-elevated)",
              color:"var(--fg-secondary)",
              border:"1px solid var(--border-subtle)",
              borderRadius:3,
              font:"500 10px var(--font-ui)",
            }}>#{t}</span>
          ))}
        </div>

        {/* Actions row */}
        <div style={{display:"flex",alignItems:"center",gap:0,borderTop:"1px solid var(--border-subtle)",paddingTop:8,marginTop:2}}>
          <button
            onClick={()=>setLiked(v=>!v)}
            style={{
              display:"inline-flex",alignItems:"center",gap:5,
              background:"transparent",border:"none",padding:"0 8px 0 0",
              color:liked?"var(--accent)":"var(--fg-muted)",
              font:`500 12px var(--font-ui)`,
              transition:"color 0.12s",
            }}
          >
            {liked ? IC.heartFill : IC.heart}
            <span>{fmtNum(item.likes + (liked?1:0))}</span>
          </button>
          <button style={{display:"inline-flex",alignItems:"center",gap:5,background:"transparent",border:"none",padding:"0 8px",color:"var(--fg-muted)",font:"500 12px var(--font-ui)"}}>
            {IC.msg}<span>{item.comments}</span>
          </button>
          <button style={{display:"inline-flex",alignItems:"center",gap:5,background:"transparent",border:"none",padding:"0 8px",color:"var(--fg-muted)",font:"500 12px var(--font-ui)"}}>
            {IC.fork}<span>{item.forks}</span>
          </button>
          <div style={{flex:1}}/>
          <button style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:26,height:26,background:"transparent",border:"none",color:"var(--fg-muted)",borderRadius:4}}>
            {IC.bookmark}
          </button>
        </div>
      </div>
    </article>
  );
}

/* ─── Left Sidebar ─── */
function LeftSidebar({ theme, toggleTheme }) {
  const [cur, setCur] = useState("profile");
  const items = [
    { k:"home",    icon:IC.home,    label:"Home" },
    { k:"explore", icon:IC.compass, label:"Explore" },
    { k:"notifs",  icon:IC.bell,    label:"Notifications", badge:3 },
    { k:"profile", icon:IC.user,    label:"Profile" },
    { k:"settings",icon:IC.settings,label:"Settings" },
  ];
  return (
    <aside style={{
      width:220, flexShrink:0,
      borderRight:"1px solid var(--border-subtle)",
      display:"flex", flexDirection:"column",
      position:"sticky", top:0, height:"100vh",
      padding:"20px 10px",
      background:"var(--bg-canvas)",
      overflowY:"auto",
    }}>
      <div style={{padding:"4px 10px 20px"}}><Logo size={18}/></div>
      <nav style={{display:"flex",flexDirection:"column",gap:2}}>
        {items.map(it=>(
          <button key={it.k} onClick={()=>setCur(it.k)}
            style={{
              display:"flex",alignItems:"center",gap:11,
              height:38,padding:"0 10px",borderRadius:7,
              background:cur===it.k?"var(--bg-elevated)":"transparent",
              border:"none",
              color:cur===it.k?"var(--fg-primary)":"var(--fg-secondary)",
              font:`${cur===it.k?"600":"500"} 13px var(--font-ui)`,
              transition:"background 0.12s,color 0.12s",
              position:"relative", textAlign:"left",
            }}
            onMouseEnter={e=>{ if(cur!==it.k){ e.currentTarget.style.background="var(--bg-elevated)"; e.currentTarget.style.color="var(--fg-primary)"; }}}
            onMouseLeave={e=>{ if(cur!==it.k){ e.currentTarget.style.background="transparent"; e.currentTarget.style.color="var(--fg-secondary)"; }}}
          >
            {it.icon}
            <span>{it.label}</span>
            {it.badge&&<span style={{marginLeft:"auto",minWidth:17,height:17,padding:"0 4px",background:"var(--accent)",color:"#fff",borderRadius:999,font:"600 9px monospace",display:"inline-flex",alignItems:"center",justifyContent:"center"}}>{it.badge}</span>}
          </button>
        ))}
      </nav>

      <button style={{
        display:"flex",alignItems:"center",justifyContent:"center",gap:7,
        height:34,borderRadius:7,margin:"14px 0 0",
        background:"var(--accent)",color:"#fff",border:"none",
        font:"600 12px var(--font-ui)",transition:"background 0.12s",
      }}
        onMouseEnter={e=>e.currentTarget.style.background="var(--accent-hover)"}
        onMouseLeave={e=>e.currentTarget.style.background="var(--accent)"}
      >
        {IC.plus} New component
      </button>

      <div style={{flex:1}}/>
      <button onClick={toggleTheme}
        style={{display:"flex",alignItems:"center",gap:9,height:38,padding:"0 10px",borderRadius:7,background:"transparent",border:"none",color:"var(--fg-secondary)",font:"500 12px var(--font-ui)",transition:"background 0.12s"}}
        onMouseEnter={e=>e.currentTarget.style.background="var(--bg-elevated)"}
        onMouseLeave={e=>e.currentTarget.style.background="transparent"}
      >
        {theme==="dark"?IC.sun:IC.moon}
        <span>{theme==="dark"?"Light mode":"Dark mode"}</span>
      </button>
      <div style={{display:"flex",alignItems:"center",gap:9,padding:"10px",borderRadius:7,marginTop:3,cursor:"pointer"}}
        onMouseEnter={e=>e.currentTarget.style.background="var(--bg-elevated)"}
        onMouseLeave={e=>e.currentTarget.style.background="transparent"}
      >
        <Av name="You" size={30} color="#A31F37" />
        <div style={{minWidth:0}}>
          <div style={{font:"600 12px var(--font-ui)",color:"var(--fg-primary)"}}>You</div>
          <div style={{font:"400 11px var(--font-mono)",color:"var(--fg-muted)"}}>@yourhandle</div>

      </div>

}

/* ─── Top bar (sticky) ─── */
function TopBar({ theme, toggleTheme, username }) {
  return (
    <header style={{
      position:"sticky",top:0,zIndex:40,height:48,
      display:"flex",alignItems:"center",gap:10,padding:"0 16px",
      background:"var(--bg-canvas)",borderBottom:"1px solid var(--border-subtle)",
      backdropFilter:"blur(8px)",WebkitBackdropFilter:"blur(8px)",
    }}>
      <Logo size={17}/>
      <span style={{color:"var(--border-strong)",fontSize:13}}>/</span>
      <span style={{font:"500 13px var(--font-mono)",color:"var(--fg-secondary)"}}>@{username}</span>
      <div style={{flex:1}}/>
      <button onClick={toggleTheme} style={{width:34,height:34,display:"inline-flex",alignItems:"center",justifyContent:"center",background:"transparent",border:"none",color:"var(--fg-secondary)",borderRadius:7,transition:"background 0.12s"}}
        onMouseEnter={e=>e.currentTarget.style.background="var(--bg-elevated)"}
        onMouseLeave={e=>e.currentTarget.style.background="transparent"}
      >{theme==="dark"?IC.sun:IC.moon}</button>
      <button style={{width:34,height:34,display:"inline-flex",alignItems:"center",justifyContent:"center",background:"transparent",border:"none",color:"var(--fg-secondary)",borderRadius:7,transition:"background 0.12s"}}
        onMouseEnter={e=>e.currentTarget.style.background="var(--bg-elevated)"}
        onMouseLeave={e=>e.currentTarget.style.background="transparent"}
      >{IC.search}</button>
      <div style={{position:"relative"}}>
        <button style={{width:34,height:34,display:"inline-flex",alignItems:"center",justifyContent:"center",background:"transparent",border:"none",color:"var(--fg-secondary)",borderRadius:7}}>{IC.bell}</button>
        <span style={{position:"absolute",top:7,right:7,width:7,height:7,background:"var(--accent)",borderRadius:"50%",border:"2px solid var(--bg-canvas)",pointerEvents:"none"}}/>

      <Av name="You" size={28} color="#A31F37"/>

}

/* ─── Profile main content ─── */
function ProfileMain({ theme, activeTab, setActiveTab, followed, setFollowed, username }) {
  const dark = theme === "dark";
  const isForks = activeTab === "forks";
  const TABS = ["components","collections","likes","forks"];

  const coverGradient = dark
    ? "radial-gradient(ellipse at 30% 60%, #1A0A0D 0%, #0F0A0C 50%, #0A0B0D 100%)"
    : "radial-gradient(ellipse at 30% 60%, #FFF0F0 0%, #FDF5F5 50%, #FAFAFA 100%)";

  return (
    <div style={{flex:1, minWidth:0, overflowY:"auto"}}>

      {/* ── HERO STRIP ── */}
      <div style={{position:"relative"}}>
        {/* Cover */}
        <div style={{height:180, background:coverGradient, position:"relative", overflow:"hidden"}}>
          {/* Subtle texture lines */}
          <div style={{position:"absolute",inset:0,opacity:0.04}}>
            {[...Array(8)].map((_,i)=>(
              <div key={i} style={{position:"absolute",top:`${i*25}%`,left:0,right:0,height:1,background:"var(--fg-primary)"}}/>
            ))}
          </div>
          {/* Accent glow */}
          <div style={{position:"absolute",bottom:-40,left:60,width:200,height:120,background:"radial-gradient(ellipse,rgba(139,26,47,0.12) 0%,transparent 70%)",borderRadius:"50%"}}/>
        </div>

        {/* Avatar cutout */}
        <div style={{
          position:"absolute", bottom:-48, left:24,
          padding:4,
          background:"var(--bg-canvas)",
          borderRadius:"50%",
        }}>
          <Av name="Luiz Felipe" size={88} color="#A31F37"/>
        </div>
      </div>

      {/* ── INFO BLOCK + ACTION ROW ── */}
      <div style={{
        padding:"60px 24px 0",
        display:"flex", alignItems:"flex-start", justifyContent:"space-between", gap:12,
      }}>
        {/* Left: info */}
        <div style={{minWidth:0}}>
          <div style={{display:"flex",alignItems:"baseline",gap:8,flexWrap:"wrap"}}>
            <h1 style={{font:"700 20px var(--font-ui)",color:"var(--fg-primary)",letterSpacing:"-0.02em"}}>Luiz Felipe</h1>
            <span style={{font:"400 14px var(--font-mono)",color:"var(--fg-muted)"}}>@{username}</span>
            <span style={{font:"400 12px var(--font-ui)",color:"var(--fg-muted)"}}>he/him</span>
          </div>
          <p style={{font:"400 14px var(--font-ui)",color:"var(--fg-secondary)",marginTop:6,lineHeight:1.5,maxWidth:440}}>
            Design engineer. Building Componi.
          </p>
          <a href="#" style={{display:"inline-flex",alignItems:"center",gap:4,marginTop:6,font:"500 13px var(--font-ui)",color:"var(--accent-hover)",textDecoration:"none"}}
            onMouseEnter={e=>e.currentTarget.style.opacity="0.8"}
            onMouseLeave={e=>e.currentTarget.style.opacity="1"}
          >
            {IC.externalLink}
            componi.dev/@{username}
          </a>
        </div>

        {/* Right: actions */}
        <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0,marginTop:4}}>
          <button
            onClick={()=>setFollowed(v=>!v)}
            style={{
              height:32, padding:"0 16px", borderRadius:6,
              background: followed ? "var(--accent)" : "transparent",
              border: `1px solid ${followed ? "var(--accent)" : "var(--border-strong)"}`,
              color: followed ? "#fff" : "var(--fg-secondary)",
              font:"600 13px var(--font-ui)",
              transition:"all 0.14s",
            }}
            onMouseEnter={e=>{ if(!followed){ e.currentTarget.style.borderColor="var(--fg-muted)"; e.currentTarget.style.color="var(--fg-primary)"; }}}
            onMouseLeave={e=>{ if(!followed){ e.currentTarget.style.borderColor="var(--border-strong)"; e.currentTarget.style.color="var(--fg-secondary)"; }}}
          >{followed?"Following":"Follow"}</button>
          <button style={{
            width:32,height:32,borderRadius:6,
            background:"transparent",border:"1px solid var(--border-strong)",
            color:"var(--fg-muted)",display:"inline-flex",alignItems:"center",justifyContent:"center",
            transition:"border-color 0.12s,color 0.12s",
          }}
            onMouseEnter={e=>{ e.currentTarget.style.borderColor="var(--fg-muted)"; e.currentTarget.style.color="var(--fg-secondary)"; }}
            onMouseLeave={e=>{ e.currentTarget.style.borderColor="var(--border-strong)"; e.currentTarget.style.color="var(--fg-muted)"; }}
          >{IC.more}</button>
        </div>
      </div>

      {/* ── METRIC STRIP ── */}
      <div style={{
        display:"flex", gap:24, alignItems:"center",
        padding:"16px 24px",
        borderBottom:"1px solid var(--border-subtle)",
        marginTop:16,
        flexWrap:"wrap",
      }}>
        {[
          { val:"2.1k", label:"Followers" },
          { val:"340",  label:"Following" },
          { val:"47",   label:"Components" },
          { val:"312",  label:"Forks received" },
        ].map(m=>(
          <button key={m.label} style={{
            display:"flex", alignItems:"baseline", gap:5,
            background:"transparent", border:"none", padding:0,
            cursor:"pointer",
          }}
            onMouseEnter={e=>{ e.currentTarget.querySelector('.metric-label').style.textDecoration="underline"; }}
            onMouseLeave={e=>{ e.currentTarget.querySelector('.metric-label').style.textDecoration="none"; }}
          >
            <span style={{font:"600 16px var(--font-ui)",color:"var(--fg-primary)"}}>{m.val}</span>
            <span className="metric-label" style={{font:"400 13px var(--font-ui)",color:"var(--fg-muted)",textUnderlineOffset:3,transition:"text-decoration 0.1s"}}>{m.label}</span>
          </button>
        ))}
      </div>

      {/* ── TAB BAR ── */}
      <div style={{
        display:"flex", gap:0, alignItems:"center",
        padding:"0 24px",
        borderBottom:"1px solid var(--border-subtle)",
      }}>
        {TABS.map(tab=>(
          <button
            key={tab}
            onClick={()=>setActiveTab(tab)}
            style={{
              height:44, padding:"0 16px",
              background:"transparent", border:"none",
              borderBottom: activeTab===tab ? "2px solid var(--accent)" : "2px solid transparent",
              font:`${activeTab===tab?"600":"400"} 13px var(--font-ui)`,
              color: activeTab===tab ? "var(--fg-primary)" : "var(--fg-muted)",
              cursor:"pointer",
              transition:"color 0.12s, border-color 0.12s",
              textTransform:"capitalize",
            }}
            onMouseEnter={e=>{ if(activeTab!==tab) e.currentTarget.style.color="var(--fg-secondary)"; }}
            onMouseLeave={e=>{ if(activeTab!==tab) e.currentTarget.style.color="var(--fg-muted)"; }}
          >{tab}</button>
        ))}
      </div>

      {/* ── GRID ── */}
      <div style={{padding:"20px 24px 48px"}}>

        {/* Tab header */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
          <span style={{font:"500 13px var(--font-ui)",color:"var(--fg-muted)"}}>
            {isForks ? "9 forks" : "47 components"}
          </span>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <select style={{
              height:28,padding:"0 28px 0 10px",
              background:"var(--bg-elevated)",
              border:"1px solid var(--border-subtle)",
              borderRadius:5,
              font:"400 12px var(--font-ui)",
              color:"var(--fg-secondary)",
              appearance:"none",WebkitAppearance:"none",
              cursor:"pointer",
            }}>
              <option>Most recent</option>
              <option>Most liked</option>
              <option>Most forked</option>
            </select>
          </div>
        </div>

        <div className="grid-3">
          {COMPONENTS.map(item=>(
            <CompactCard key={item.id} item={item} isForks={isForks} dark={dark} />
          ))}
        </div>
      </div>
    </div>
  );
}

/* ─── App ─── */
function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  const [theme, setTheme]     = useState(tweaks.theme);
  const [activeTab, setActiveTabState] = useState(tweaks.activeTab);
  const [followed, setFollowedState]   = useState(tweaks.followed);
  const username = tweaks.username || "luiz";

  // Sync from tweaks
  useEffect(()=>{ setTheme(tweaks.theme); document.documentElement.setAttribute("data-theme", tweaks.theme); }, [tweaks.theme]);
  useEffect(()=>{ setActiveTabState(tweaks.activeTab); }, [tweaks.activeTab]);
  useEffect(()=>{ setFollowedState(tweaks.followed); }, [tweaks.followed]);

  const toggleTheme = () => {
    const next = theme==="dark"?"light":"dark";
    setTheme(next);
    document.documentElement.setAttribute("data-theme", next);
    setTweak("theme", next);
  };

  const setActiveTab = (v) => { setActiveTabState(v); setTweak("activeTab", v); };
  const setFollowed  = (fn) => {
    const next = typeof fn === "function" ? fn(followed) : fn;
    setFollowedState(next);
    setTweak("followed", next);
  };

  const mq = window.innerWidth;
  const isDesktop = mq >= 1024;

  return (
    <div style={{display:"flex",flexDirection:"column",minHeight:"100vh",background:"var(--bg-canvas)"}}>
      {isDesktop ? (
        <div style={{display:"flex",minHeight:"100vh"}}>
          <LeftSidebar theme={theme} toggleTheme={toggleTheme}/>
          <div style={{flex:1,display:"flex",flexDirection:"column",minWidth:0}}>
            <ProfileMain
              theme={theme}
              activeTab={activeTab}
              setActiveTab={setActiveTab}
              followed={followed}
              setFollowed={setFollowed}
              username={username}
            />
          </div>
        </div>
      ) : (
        <>
          <TopBar theme={theme} toggleTheme={toggleTheme} username={username}/>
          <ProfileMain
            theme={theme}
            activeTab={activeTab}
            setActiveTab={setActiveTab}
            followed={followed}
            setFollowed={setFollowed}
            username={username}
          />
        </>
      )}

      <TweaksPanel>
        <TweakSection label="Theme" />
        <TweakRadio id="theme" options={["dark","light"]} value={tweaks.theme} onChange={v=>setTweak("theme",v)}/>
        <TweakSection label="Active Tab" />
        <TweakRadio id="activeTab" options={["components","likes","forks","collections"]} value={tweaks.activeTab} onChange={v=>setTweak("activeTab",v)}/>
        <TweakSection label="Social" />
        <TweakToggle id="followed" label="Following user" value={tweaks.followed} onChange={v=>setTweak("followed",v)}/>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
